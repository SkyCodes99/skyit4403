<!DOCTYPE html>
<html>
<head>
    <title>Book Detail View</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial; background: #0f172a; color: white; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: #1e293b; padding: 30px; border: 1px solid #FFC629; border-radius: 15px; }
        img { float: left; margin-right: 25px; width: 150px; border-radius: 5px; }
        h1 { color: #FFC629; margin-top: 0; }
        .back { color: #FFC629; text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Back to Portal</a>
    <div id="content" class="container">Reading book metadata...</div>

    <script>
    $(document).ready(function() {
        $.getJSON('google-books-book.json', function(data) {
            var book = data.volumeInfo;
            var html = "";
            html += "<img src='" + book.imageLinks.thumbnail + "'>";
            html += "<h1>" + book.title + "</h1>";
            html += "<p><strong>Author:</strong> " + book.authors[0] + "</p>";
            html += "<p><strong>Description:</strong> " + book.description + "</p>";
            html += "<p><strong>Page Count:</strong> " + book.pageCount + "</p>";
            
            $("#content").html(html);
        });
    });
    </script>
</body>
</html>
